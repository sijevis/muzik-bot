<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Spotify Bağlantısı</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 400px;
      width: 100%;
      padding: 32px;
      background: #1e1e2e;
      border-radius: 16px;
      border: 1px solid #2d2d44;
      text-align: center;
      color: white;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon.spotify { background: rgba(29, 185, 84, 0.2); }
    .icon.success { background: rgba(29, 185, 84, 0.2); }
    .icon.error { background: rgba(239, 68, 68, 0.2); }
    h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 14px; color: #a0a0b8; margin-bottom: 12px; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(29, 185, 84, 0.3);
      border-top-color: #1DB954;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn {
      padding: 10px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid #2d2d44;
      background: #2d2d44;
      color: #e0e0f0;
      transition: background 0.2s;
    }
    .btn:hover { background: #3d3d5c; }
    #loading { display: block; }
    #success { display: none; }
    #error { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div id="loading">
      <div class="icon spotify">
        <div class="spinner"></div>
      </div>
      <h2>Spotify Bağlanıyor...</h2>
      <p>Lütfen bekleyin, hesabınız bağlanıyor.</p>
    </div>

    <div id="success">
      <div class="icon success">
        <svg width="32" height="32" fill="none" stroke="#1DB954" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
        </svg>
      </div>
      <h2>Bağlantı Başarılı!</h2>
      <p>Spotify hesabınız başarıyla bağlandı.</p>
      <p style="font-size:12px; color:#6b6b80; margin-top:8px;">Bu pencere otomatik kapanacak...</p>
    </div>

    <div id="error">
      <div class="icon error">
        <svg width="32" height="32" fill="none" stroke="#ef4444" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </div>
      <h2>Bağlantı Hatası</h2>
      <p id="error-msg">Spotify bağlantısı başarısız oldu.</p>
      <button class="btn" onclick="window.close()">Pencereyi Kapat</button>
    </div>
  </div>

  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const spotifyError = params.get('error');
      const userId = localStorage.getItem('muzikbot-spotify-user-id')
        || localStorage.getItem('muzikbot-auth-id')
        || localStorage.getItem('muzikbot-user-id');

      if (spotifyError) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error-msg').textContent = 'Spotify bağlantısı reddedildi.';
        return;
      }

      if (!code) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error-msg').textContent = 'Spotify callback kodu bulunamadı.';
        return;
      }

      if (!userId) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error-msg').textContent = 'Kullanıcı oturumu bulunamadı. Lütfen tekrar deneyin.';
        return;
      }

      const redirectUri = window.location.origin + '/spotify-callback';

      fetch('/api/auth/spotify-callback', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code: code, user_id: userId, redirect_uri: redirectUri })
      })
      .then(function(response) { return response.json(); })
      .then(function(data) {
        if (data.spotify_connected) {
          document.getElementById('loading').style.display = 'none';
          document.getElementById('success').style.display = 'block';
          if (window.opener) {
            window.opener.postMessage({ type: 'spotify-connected' }, '*');
          }
          setTimeout(function() { window.close(); }, 2000);
        } else {
          document.getElementById('loading').style.display = 'none';
          document.getElementById('error').style.display = 'block';
          document.getElementById('error-msg').textContent = data.error || 'Spotify bağlantısı başarısız.';
        }
      })
      .catch(function(err) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error-msg').textContent = 'Bağlantı hatası: ' + err.message;
      });
    })();
  </script>
</body>
</html>
